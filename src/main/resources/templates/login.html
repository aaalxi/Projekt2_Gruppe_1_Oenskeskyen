<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/style.css}">
    <title>Login side</title>
    <link rel="icon" th:href="@{/img/oenskelogosvg.svg}" type="image/svg">
</head>
<body>

<header>
    <div th:replace="~{fragment/header :: site-header}"></div>
</header>

<div class="main-content">
    <h1 class="button">Login</h1>

    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="runeBear" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" value="hej312" required>
        <button type="submit">Login</button>
    </form>
</div>

<footer class="site-footer">
    <div th:replace="~{fragment/footer :: site-footer}"></div>
</footer>

</body>
</html>
