<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/header.css}">
    <link rel="stylesheet" th:href="@{/footer.css}">
    <title>Din profil</title>
    <link rel="icon" th:href="@{/img/oenskelogosvg.svg}" type="image/svg">
</head>

<body>

<header th:replace="~{fragment/header :: site-header}"></header>

<div class="main-content">
    <h1>Min profil</h1>

    <section>
        <p>Brugernavn: <span th:text="${session.user.username}"></span></p>
        <p>Email: <span th:text="${session.user.email}"></span></p>
        <p>Fødselsdag: <span th:text="${session.user.birthday}"></span></p>
    </section>

</div>

<div class="main-content">
    <h2>Ønskelister</h2>
    <div>
        <a th:href="@{/profile/createWishlist}">
            <button>Opret ny ønskeliste</button>
        </a>
    </div>

    <div class="wishlist-list">
        <div th:each="list : ${wishlists}" class="wishlist-individual">
            <a th:href="@{/profile/wishlist/{id}(id=${list.ID})}">
                <h3 th:text="${list.title}">Wishlist title</h3>

                <div class="wishlist-text">
                    <p th:text="${list.createdAt}">creation date</p>
                </div>
            </a>

            <form th:action="@{/profile/deleteWishlist}" method="post">
                <input type="hidden" th:name="ID" th:value="${list.ID}">
                <button type="submit" class="delete-button">Slet liste</button>
            </form>
        </div>
    </div>

</div>


<footer th:replace="~{fragment/footer :: site-footer}"></footer>
</body>
</html>
