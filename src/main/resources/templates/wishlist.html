<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/style.css}">
    <title>Ønskeliste</title>
    <link rel="icon" th:href="@{/img/oenskelogosvg.svg}" type="image/svg">
</head>
<body>
<header>
    <div th:replace="~{fragment/header :: site-header}"></div>
</header>

<div class="main-content">
    <div class="wishlist-wishes">
        <div class="wishlist-title-container">
            <h3 th:text="${wishlist.title}"></h3>

            <form th:action="@{/profile/deleteWishlist}" method="post">
                <input type="hidden" th:name="ID" th:value="${wishlist.ID}">
                <button type="submit" class="delete-button">Slet ønskeliste</button>
            </form>
        </div>

        <div class="wishlist-list">
            <div class="wish-individual" th:each="wish : ${wishes}">
                <p th:text="${wish.getName()}"></p>
                <p th:text="${wish.getDescription()}"></p>
                <p th:text="${wish.getPrice()}"></p>
                <!-- denne side er ikke færdig endnu -->

                <form class="delete-button-container" th:action="@{/wishlist/delete}" method="post">
                    <input type="hidden" th:name="wishId" th:value="${wish.ID}">
                    <input type="hidden" th:name="wishlistId" th:value="${wishlist.ID}">
                    <button class="delete-button" id="dlt-btn" type="submit">Slet ønske</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="wishlist-button">
        <a th:href="@{/wishlist/add(id=${wishlist.ID})}">
            <button type="submit">Tilføj ønske til ønskeliste</button>
        </a>
        <p>
            <br>
        </p>
    </div>
</div>

<footer>
    <div th:replace="~{fragment/footer :: site-footer}"></div>
</footer>
</body>
</html>
