<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>
</head>
<body>
<header>
    <div th:replace="~{fragment/header :: site-header}"></div>
</header>

<div>
    <h3 th:text="${wishlist.title}"></h3>
    <div th:each="wish : ${wishes}">
        <p th:text="${wish.getName()}"></p>
        <p th:text="${wish.getDescription()}">text</p>
        <p th:text="${wish.getPrice()}"></p>
        <!-- denne side er ikke færdig endnu -->
    </div>
</div>

<div>
    <form th:action="@{/wishlists/delete}" method="post">
        <input type="hidden" th:name="ID" th:value="${wishlist.ID}">
        <button type="submit">Slet liste</button>
    </form>
</div>

<footer>
    <div th:replace="~{fragment/footer :: site-footer}"></div>
</footer>
</body>
</html>
