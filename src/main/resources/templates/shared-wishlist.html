<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/style.css}">
    <title>Delt ønskeliste</title>
    <link rel="icon" th:href="@{/img/oenskelogosvg.svg}" type="image/svg">
</head>
<body>

<div class="main-content">
    <div class="wishlist-wishes">
        <div class="wishlist-title-container">
            <h3 th:text="${wishlist.title}"></h3>

        </div>

        <div class="wishlist-list">
            <div class="wish-individual" th:each="wish : ${wishes}">
                <strong><p id="black" th:text="${wish.getName()}"></p></strong>
                <p th:text="${wish.getPrice() + wish.getCurrency()}"></p>

                <form th:if="${canReserve && !reservedWishIDs.contains(wish.ID)}"
                      th:action="@{/wishlist/reserve}" method="post">
                    <input type="hidden" name="wishID" th:value="${wish.ID}">
                    <input type="hidden" name="token" th:value="${wishlist.shareToken}">
                    <button type="submit">Reserver</button>
                </form>

                <form th:if="${canReserve && myReservationIDs.contains(wish.ID)}"
                      th:action="@{/wishlist/cancelReservation}" method="post">
                    <input type="hidden" name="wishID" th:value="${wish.ID}">
                    <input type="hidden" name="token" th:value="${wishlist.shareToken}">
                    <button type="submit" class="delete-button">Annuller reservation</button>
                </form>

                <p th:if="${canReserve && reservedWishIDs.contains(wish.ID) && !myReservationIDs.contains(wish.ID)}">
                    Reserveret
                </p>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragment/footer :: site-footer}"></footer>
</body>
</html>
