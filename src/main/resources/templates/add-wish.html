<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tilføj ønske</title>
</head>
<body>
<header>
    <div th:replace="~{fragment/header :: site-header}"></div>
</header>

<div>
    <form th:action="@{/wishlist/add}" method="post">
        <label for="name">Navn</label>
        <input type="text" id="name" name="name" required>
        <label for="url">Link</label>
        <input type="url" id="url" name="url">
        <label for="description">Beskrivelse</label>
        <input type="text" id="description" name="description">
        <label for="price">Pris</label>
        <input type="number" id="price" name="price">
        <label for="priority">Prioritet</label>
        <input type="number" id="priority" name="priority">
        <input type="hidden" th:name="id" th:value="${wishlist.ID}">
        <button type="submit">Opret ønske</button>
    </form>
</div>

<footer>
    <div th:replace="~{fragment/footer :: site-footer}"></div>
</footer>
</body>
</html>
